name: "Integration Test"

on:
  pull_request:
    paths:
      - 'doc_issues/**'
      - 'action.yml'
      - '.github/workflows/integration_test.yml'
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    name: Integration Test - Real World Usage
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run collector on living-doc-collector-gh repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set required inputs as environment variables
          export INPUT_GITHUB_TOKEN="${GITHUB_TOKEN}"
          export INPUT_DOC_ISSUES="true"
          export INPUT_DOC_ISSUES_REPOSITORIES='[{"organization-name": "AbsaOSS", "repository-name": "living-doc-collector-gh"}]'
          export INPUT_VERBOSE_LOGGING="true"
          
          # Run the main collector script
          python3 main.py

      - name: Verify output structure
        run: |
          # Check that the output directory exists
          if [ ! -d "./output/doc-issues" ]; then
            echo "Error: Output directory not found"
            exit 1
          fi
          
          # Check that the doc-issues.json file exists
          if [ ! -f "./output/doc-issues/doc-issues.json" ]; then
            echo "Error: doc-issues.json not found"
            exit 1
          fi
          
          echo "✓ Output directory and file exist"

      - name: Validate JSON structure
        run: |
          python3 << 'EOF'
          import json
          import sys
          from datetime import datetime

          # Load the generated JSON
          with open('./output/doc-issues/doc-issues.json', 'r') as f:
              data = json.load(f)

          print("Validating JSON structure...")

          # Check top-level structure
          assert 'metadata' in data, "Missing 'metadata' section"
          assert 'items' in data, "Missing 'items' section"
          print("✓ Top-level structure is correct")

          # Validate metadata
          metadata = data['metadata']
          required_metadata_fields = ['producer', 'source', 'run', 'original_metadata']
          for field in required_metadata_fields:
              assert field in metadata, f"Missing metadata field: {field}"
          print("✓ Metadata section has all required fields")

          # Validate producer
          assert 'name' in metadata['producer'], "Missing producer name"
          assert metadata['producer']['name'] == 'AbsaOSS/living-doc-collector-gh', "Incorrect producer name"
          assert 'version' in metadata['producer'], "Missing producer version"
          print("✓ Producer metadata is correct")

          # Validate schema_version
          original_metadata = metadata['original_metadata']
          assert 'schema_version' in original_metadata, "Missing schema_version in original_metadata"
          print(f"✓ Schema version: {original_metadata['schema_version']}")

          # Validate timestamp format
          try:
              datetime.fromisoformat(original_metadata['generated_at'].replace('Z', '+00:00'))
              print("✓ Timestamp format is valid ISO-8601")
          except ValueError as e:
              print(f"✗ Invalid timestamp format: {e}")
              sys.exit(1)

          # Validate source
          assert 'repositories' in metadata['source'], "Missing source repositories"
          print("✓ Source metadata is present")

          # Validate run info
          assert 'workflow' in metadata['run'], "Missing workflow in run metadata"
          assert 'run_id' in metadata['run'], "Missing run_id in run metadata"
          print("✓ Run metadata is present")

          # Validate items
          items = data['items']
          print(f"Found {len(items)} item(s)")

          if items:
              first_item = items[0]

              # Check required base fields
              required_fields = ['id', 'title', 'state', 'url']
              for field in required_fields:
                  assert field in first_item, f"Missing required field: {field}"
              print("✓ Item base fields are present")

          print("\n✅ All validation checks passed!")
          print(f"Generated file: {original_metadata['generated_at']}")
          print(f"Total items: {len(items)}")
          EOF

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: integration-test-output
          path: ./output/
          retention-days: 7

      - name: Display sample output
        if: always()
        run: |
          echo "=== Sample Output ==="
          python3 << 'EOF'
          import json
          
          with open('./output/doc-issues/doc-issues.json', 'r') as f:
              data = json.load(f)
          
          # Print metadata
          print("\n--- File Metadata ---")
          print(json.dumps(data['metadata'], indent=2))
          
          # Print first item (if exists)
          if data['items']:
              first_item = data['items'][0]
              print(f"\n--- Sample Item ({first_item.get('id', 'unknown')}) ---")
              print(json.dumps(first_item, indent=2))
          EOF
